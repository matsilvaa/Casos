/* ========================= BANDEJA (ADMIN) ========================= */
function Portal({tickets,porFolio,initEd,onOpen}){
  const [fEstatus,setFEstatus]=useState("Abiertos"); const [fPrio,setFPrio]=useState("Todas"); const [fArea,setFArea]=useState("Todas"); const [q,setQ]=useState("");
  const [eds,setEds]=useState(initEd?[initEd]:[]); const [fEdad,setFEdad]=useState("Todas"); const [orden,setOrden]=useState("prioridad");
  const estatuses=["Abiertos","Recibido","En proceso","Cerrado","Todos"]; const prios=["Todas","Emergencia","Alta","Media","Baja"];
  const list=useMemo(()=>tickets.filter(t=>{
    if(fEstatus==="Abiertos" && t.estatus==="Cerrado") return false;
    if(!["Abiertos","Todos"].includes(fEstatus) && t.estatus!==fEstatus) return false;
    if(fPrio!=="Todas" && t.prioridad!==fPrio) return false;
    if(fArea!=="Todas" && t.familia!==fArea) return false;
    if(eds.length && !eds.includes(t.edificio)) return false;
    if(fEdad!=="Todas"){ const b=BUCKETS.find(x=>x.k===fEdad); if(b && !b.test(dias(msAcumulado(t,porFolio||{})))) return false; }
    if(q){ const s=((t.folio||"")+(t.nombre||"")+(t.categoria||"")+(t.edificio||"")+(t.unidad||"")+(t.descripcion||"")).toLowerCase(); if(!s.includes(q.toLowerCase())) return false; }
    return true;
  }),[tickets,fEstatus,fPrio,fArea,q,eds,fEdad,porFolio]);
  const order={Emergencia:0,Alta:1,Media:2,Baja:3};
  const sorted=[...list].sort((a,b)=>
    orden==="antiguedad"
      ? msAcumulado(b,porFolio||{}) - msAcumulado(a,porFolio||{})
      : (order[a.prioridad]-order[b.prioridad])||(new Date(b.updatedAt)-new Date(a.updatedAt))
  );
  return (
    <div>
      <div className="view-head"><div className="kicker">Administración</div><h2>Bandeja de casos</h2><p>Todos los edificios en una sola vista. Filtra por edificio, área, prioridad, estado o antigüedad.</p></div>
      <div className="filters">
        {estatuses.map(s=><button key={s} className={"chip"+(fEstatus===s?" active":"")} onClick={()=>setFEstatus(s)}>{s}</button>)}
        <div style={{width:1,height:22,background:"var(--line)"}}></div>
        <MultiSelect options={EDIFICIOS} selected={eds} onChange={setEds} label="Edificios" />
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fArea} onChange={e=>setFArea(e.target.value)}><option value="Todas">Todas las áreas</option>{Object.entries(FAMILIAS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fPrio} onChange={e=>setFPrio(e.target.value)}>{prios.map(p=><option key={p}>{p==="Todas"?"Todas las prioridades":p}</option>)}</select>
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fEdad} onChange={e=>setFEdad(e.target.value)}>
          <option value="Todas">Toda antigüedad</option>
          {BUCKETS.map(b=><option key={b.k} value={b.k}>{b.k}</option>)}
        </select>
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={orden} onChange={e=>setOrden(e.target.value)}>
          <option value="prioridad">Ordenar por prioridad</option>
          <option value="antiguedad">Ordenar por antigüedad</option>
        </select>
        <input className="ctrl search" placeholder="Buscar por folio, nombre, unidad…" value={q} onChange={e=>setQ(e.target.value)} />
      </div>
      <div className="hint" style={{marginBottom:12}}>{sorted.length} caso{sorted.length!==1?"s":""}{eds.length?` · ${eds.join(", ")}`:" · todos los edificios"}{fEdad!=="Todas"?` · ${fEdad}`:""}</div>
      {sorted.length===0
        ? <div className="card"><div className="empty-state"><div className="em-ic">✧</div>No hay casos con estos filtros.</div></div>
        : <div className="caselist">{sorted.map(t=>(
            <button key={t.id} className={"caserow "+(t.prioridad==="Emergencia"?"b-emerg":t.prioridad==="Alta"?"b-alta":"")} onClick={()=>onOpen(t)}>
              <div><div className="folio mono">{t.folio}</div><div style={{marginTop:6}}><Pill kind={prioClass(t.prioridad)} text={t.prioridad} /></div></div>
              <div><div className="tt">{t.categoria} {t.relacionadoCon&&<span className="ref-tag">↩ {t.relacionadoCon}</span>}</div><div className="meta">{t.edificio} · Depto {t.unidad} · {t.nombre} · {relDays(t.createdAt)}</div></div>
              <div className="rt"><Pill kind={statClass(t.estatus)} text={t.estatus} />{t.estatus!=="Cerrado" && <span className={"edad "+edadClass(dias(msCaso(t)))}>{fmtDur(msCaso(t))}</span>}<span className="hint">{t.responsable}</span></div>
            </button>))}</div>}
    </div>
  );
}

/* ========================= DETALLE ========================= */
function Detail({entry,porFolio,onClose,update,crearRelacionado,related,openTicketByFolio}){
  const {ticket:t,mode}=entry; const isAdmin=mode==="admin"; const isClosed=t.estatus==="Cerrado";
  const [resp,setResp]=useState(""); const [reabrir,setReabrir]=useState(false); const [reText,setReText]=useState("");
  const propio=msCaso(t); const acumulado=msAcumulado(t, porFolio||{}); const enCadena=(porFolio&&t.relacionadoCon)?true:false;
  const addStaff=()=>{
    if(!resp.trim())return;
    const patch={hilo:[...(t.hilo||[]),{autor:t.responsable,rol:"staff",mensaje:resp.trim(),fecha:new Date().toISOString()}]};
    let detalle="Registró una respuesta al residente.";
    if(t.estatus==="Recibido"){ patch.estatus="En proceso"; detalle="Registró una respuesta y pasó el caso a «En proceso»."; }
    update(t.id,patch,"Respuesta registrada.","ok",detalle); setResp("");
  };
  const setStatus=(s)=>update(t.id,{estatus:s},`Estatus actualizado a «${s}».`,"info",`Cambió el estatus de «${t.estatus}» a «${s}».`);
  const doRelacionado=async()=>{ if(!reText.trim())return; const nt=await crearRelacionado(t,reText.trim()); setReabrir(false); setReText(""); if(nt) openTicketByFolio(nt.folio); };
  return (
    <div className="scrim" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="dr-head"><div className="top">
          <div>
            <span className="folio mono" style={{color:"var(--muted)",fontSize:12}}>{t.folio}</span>
            <h3>{t.categoria}</h3>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <Pill kind={prioClass(t.prioridad)} text={t.prioridad} /><Pill kind={statClass(t.estatus)} text={t.estatus} />
              {t.relacionadoCon && <button className="ref-tag" onClick={()=>openTicketByFolio(t.relacionadoCon)}>↩ relaciona {t.relacionadoCon}</button>}
            </div>
          </div>
          <button className="dr-close" onClick={onClose}>✕</button>
        </div></div>
        <div className="dr-body">
          <dl className="kv">
            <dt>Área</dt><dd>{FAMILIAS[t.familia].label}</dd>
            <dt>Responsable</dt><dd>{t.responsable}</dd>
            <dt>Edificio</dt><dd>{t.edificio}</dd>
            <dt>Unidad</dt><dd className="mono">{t.unidad}</dd>
            {isAdmin && <><dt>Solicitante</dt><dd>{t.nombre}</dd><dt>Contacto</dt><dd>{t.email}{t.telefono?" · "+t.telefono:""}</dd></>}
            {t.ubicacion?<><dt>Ubicación</dt><dd>{t.ubicacion}</dd></>:null}
            <dt>Ingresado</dt><dd>{fmtDate(t.createdAt)}</dd>
          </dl>

          {isAdmin && <>
            <div className="block-title" style={{marginTop:0}}>Tiempo transcurrido</div>
            <div className="tiempos">
              <div className="tiempo-card">
                <div className="tl">{isClosed?"Duración del caso":"Abierto hace"}</div>
                <div className="tv">{fmtDur(propio)}</div>
              </div>
              <div className="tiempo-card">
                <div className="tl">Acumulado {enCadena?"(con cadena)":""}</div>
                <div className="tv">{fmtDur(acumulado)}</div>
              </div>
            </div>
            {enCadena && <div className="hint" style={{marginTop:-2,marginBottom:6}}>Suma el tiempo de este caso y el de los casos anteriores a los que hace referencia.</div>}

            <div className="block-title">Estatus del caso</div>
            {isClosed
              ? <div className="locknote"><span>🔒</span><span>Este caso está <b>cerrado</b>: no puede modificarse ni reabrirse. Si el problema persiste, el residente puede generar un caso relacionado que conserva el historial.</span></div>
              : <div className="status-actions">{["Recibido","En proceso","Cerrado"].map(s=><button key={s} className={"btn sm"+(t.estatus===s?" primary":"")} onClick={()=>setStatus(s)}>{s}</button>)}</div>}
            {!isClosed && <>
              <div className="block-title">Responsable asignado</div>
              <select className="ctrl" value={t.responsable} onChange={e=>update(t.id,{responsable:e.target.value},`Reasignado a ${e.target.value}.`,"info",`Reasignó el caso de ${t.responsable} a ${e.target.value}.`)}>{RESPONSABLES.map(r=><option key={r}>{r}</option>)}</select>
            </>}
          </>}

          {!isAdmin && <div className="tiempos" style={{gridTemplateColumns:"1fr"}}>
            <div className="tiempo-card">
              <div className="tl">{isClosed?"Duración del caso":"Tu caso lleva abierto"}</div>
              <div className="tv">{fmtDur(propio)}</div>
            </div>
          </div>}

          {related && related.length>0 && <>
            <div className="block-title">Casos relacionados</div>
            <div className="caselist">{related.map(r=>(
              <button key={r.id} className="caserow" onClick={()=>openTicketByFolio(r.folio)}>
                <div><div className="folio mono">{r.folio}</div></div>
                <div><div className="tt" style={{fontSize:13}}>{r.categoria}</div><div className="meta">reapertura · {relDays(r.createdAt)}</div></div>
                <div className="rt"><Pill kind={statClass(r.estatus)} text={r.estatus} /></div>
              </button>))}</div>
          </>}

          {(t.adjuntos && t.adjuntos.length>0) && <>
            <div className="block-title">Adjuntos</div>
            <div className="adj-list">
              {t.adjuntos.map((a,i)=>(
                <a key={i} className="adj-item" href={a.url} target="_blank" rel="noopener noreferrer">
                  <span className="adj-ic">{a.tipo&&a.tipo.startsWith("image/")?"🖼️":"📄"}</span>
                  <span className="adj-nm">{a.nombre}</span>
                  <span className="adj-sz">{(a.tamano/1048576).toFixed(1)} MB</span>
                </a>))}
            </div>
          </>}

          <div className="block-title">Conversación</div>
          <div className="thread">
            <div className="msg"><div className="who"><span>{t.nombre}</span><span className="tm">{fmtDate(t.createdAt)}</span></div><div className="tx">{t.descripcion}</div></div>
            {(t.hilo||[]).map((m,i)=><div key={i} className={"msg "+(m.rol==="staff"?"staff":"")}><div className="who"><span>{m.autor}{m.rol==="staff"?" · administración":""}</span><span className="tm">{fmtDate(m.fecha)}</span></div><div className="tx">{m.mensaje}</div></div>)}
          </div>

          {isClosed
            ? (isAdmin
                ? <div className="locknote" style={{marginTop:12}}><span>🔒</span><span>Conversación cerrada. No se pueden registrar más respuestas en este caso.</span></div>
                : (related && related.length>0
                    ? <div className="locknote" style={{marginTop:12}}><span>ℹ️</span><span>Este caso está cerrado. Ya existe un caso relacionado ({related.map(r=>r.folio).join(", ")}) que la administración está revisando.</span></div>
                    : (!reabrir
                        ? <div style={{marginTop:12}}><div className="locknote" style={{marginBottom:10}}><span>🔒</span><span>Este caso fue cerrado y no admite más mensajes. Si el problema no se resolvió, genera un caso relacionado que conserva el historial.</span></div><button className="btn" onClick={()=>setReabrir(true)}>El problema persiste · generar caso relacionado</button></div>
                        : <div className="card pad" style={{marginTop:12,background:"#fff"}}><Field label="¿Qué sigue ocurriendo?" req><textarea className="ctrl" placeholder="Explica por qué consideras que el caso no está resuelto." value={reText} onChange={e=>setReText(e.target.value)} /></Field><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn ghost sm" onClick={()=>setReabrir(false)}>Cancelar</button><button className="btn primary sm" onClick={doRelacionado} disabled={!reText.trim()}>Generar caso relacionado</button></div></div>)))
            : (isAdmin
                ? <div style={{marginTop:12}}>
                    <textarea className="ctrl" placeholder="Escribe una respuesta para el residente…" value={resp} onChange={e=>setResp(e.target.value)} style={{minHeight:80}} />
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button className="btn primary sm" onClick={addStaff} disabled={!resp.trim()}>Registrar respuesta</button></div>
                  </div>
                : <div className="locknote" style={{marginTop:12}}><span>⏳</span><span>Tu caso está en gestión. Te avisaremos por aquí cuando la administración responda.</span></div>)}

          {isAdmin && <>
            <div className="block-title">Registro de modificaciones</div>
            <ul className="log">
              {(t.acciones||[]).slice().reverse().map((a,i)=>(
                <li key={i}><span className="lg-dot"></span>
                  <span>
                    {a.autor && <span className="lg-autor">{a.autor}</span>}{a.autor?" · ":""}{a.detalle}
                    <span className="lg-meta">{fmtDate(a.fecha)}{a.autorEmail?" · "+a.autorEmail:""}</span>
                  </span>
                </li>))}
              {(!t.acciones||t.acciones.length===0) && <li className="hint">Sin modificaciones registradas.</li>}
            </ul>
            <div className="hint" style={{marginTop:8}}>Visible solo para administración. El residente no ve este registro.</div>
          </>}
        </div>
      </div>
    </div>
  );
}

/* ========================= PANEL (ADMIN) ========================= */
function Panel({tickets,porFolio,onOpen,goPortal}){
  const [fEstatus,setFEstatus]=useState("Todos"); const [eds,setEds]=useState([]); const [fArea,setFArea]=useState("Todas"); const [fPrio,setFPrio]=useState("Todas"); const [fUnidad,setFUnidad]=useState(""); const [fEdad,setFEdad]=useState("Todas");
  const estatuses=["Todos","Abiertos","Recibido","En proceso","Cerrado"]; const prios=["Todas","Emergencia","Alta","Media","Baja"];
  const filtered=useMemo(()=>tickets.filter(t=>{
    if(fEstatus==="Abiertos" && t.estatus==="Cerrado") return false;
    if(!["Abiertos","Todos"].includes(fEstatus) && t.estatus!==fEstatus) return false;
    if(eds.length && !eds.includes(t.edificio)) return false;
    if(fArea!=="Todas" && t.familia!==fArea) return false;
    if(fPrio!=="Todas" && t.prioridad!==fPrio) return false;
    if(fUnidad.trim() && !norm(t.unidad||"").includes(norm(fUnidad))) return false;
    if(fEdad!=="Todas"){ const b=BUCKETS.find(x=>x.k===fEdad); if(b && !b.test(dias(msAcumulado(t,porFolio||{})))) return false; }
    return true;
  }),[tickets,fEstatus,eds,fArea,fPrio,fUnidad,fEdad,porFolio]);

  // Antigüedad: solo tiene sentido sobre los casos abiertos.
  const abiertosF=filtered.filter(t=>t.estatus!=="Cerrado");
  const conEdad=abiertosF.map(t=>({t, acum:msAcumulado(t, porFolio||{}), propio:msCaso(t)}))
                         .sort((a,b)=>b.acum-a.acum);
  const promedioMs = conEdad.length ? conEdad.reduce((s,x)=>s+x.acum,0)/conEdad.length : 0;
  const masAntiguo = conEdad.length ? conEdad[0] : null;
  const bucketCounts = BUCKETS.map(b=>({...b, n:conEdad.filter(x=>b.test(dias(x.acum))).length}));
  const maxBucket = Math.max(1, ...bucketCounts.map(x=>x.n));

  const total=filtered.length; const by=(k,v)=>filtered.filter(t=>t[k]===v).length;
  const emergAbiertas=filtered.filter(t=>t.prioridad==="Emergencia"&&t.estatus!=="Cerrado").length;
  const famCounts=Object.keys(FAMILIAS).map(k=>({k,label:FAMILIAS[k].label,n:filtered.filter(t=>t.familia===k).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const edCounts=EDIFICIOS.map(e=>({e,n:filtered.filter(t=>t.edificio===e).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const maxFam=Math.max(1,...famCounts.map(x=>x.n)); const maxEd=Math.max(1,...edCounts.map(x=>x.n));
  const recientes=[...filtered].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,6);
  const prioColor={Emergencia:"var(--emerg)",Alta:"var(--alta)",Media:"var(--media)",Baja:"var(--baja)"};
  const clear=()=>{ setFEstatus("Todos"); setEds([]); setFArea("Todas"); setFPrio("Todas"); setFUnidad(""); setFEdad("Todas"); };
  const active = fEstatus!=="Todos"||eds.length||fArea!=="Todas"||fPrio!=="Todas"||fUnidad.trim()||fEdad!=="Todas";

  return (
    <div>
      <div className="view-head"><div className="kicker">Administración</div><h2>Panel general</h2><p>Vista consolidada de todos los edificios. Filtra por edificio, estado, área o prioridad y los indicadores se recalculan.</p></div>
      <div className="filters">
        {estatuses.map(s=><button key={s} className={"chip"+(fEstatus===s?" active":"")} onClick={()=>setFEstatus(s)}>{s}</button>)}
        <div style={{width:1,height:22,background:"var(--line)"}}></div>
        <MultiSelect options={EDIFICIOS} selected={eds} onChange={setEds} label="Edificios" />
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fArea} onChange={e=>setFArea(e.target.value)}><option value="Todas">Todas las áreas</option>{Object.entries(FAMILIAS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fPrio} onChange={e=>setFPrio(e.target.value)}>{prios.map(p=><option key={p}>{p==="Todas"?"Todas las prioridades":p}</option>)}</select>
        <input className="ctrl" style={{width:170,padding:"7px 10px"}} placeholder="Unidad / Depto…" value={fUnidad} onChange={e=>setFUnidad(e.target.value)} />
        <select className="ctrl" style={{width:"auto",padding:"7px 10px"}} value={fEdad} onChange={e=>setFEdad(e.target.value)}>
          <option value="Todas">Toda antigüedad</option>
          {BUCKETS.map(b=><option key={b.k} value={b.k}>{b.k}</option>)}
        </select>
        {active && <button className="btn ghost sm" onClick={clear}>Limpiar filtros</button>}
      </div>
      {fEdad!=="Todas" && <div className="hint" style={{marginTop:-6,marginBottom:12}}>Antigüedad = tiempo acumulado del caso y de los casos anteriores a los que hace referencia. En los cerrados, es cuánto tardó en resolverse.</div>}
      {eds.length===0 && fUnidad.trim() && <div className="hint" style={{marginTop:-6,marginBottom:12}}>Buscando la unidad «{fUnidad}» en todos los edificios. Selecciona un edificio para acotar.</div>}
      <div className="kpis">
        <div className="kpi"><div className="n">{total}</div><div className="l">Casos</div></div>
        <div className="kpi"><div className="n">{by("estatus","Recibido")}</div><div className="l">Recibidos</div></div>
        <div className="kpi"><div className="n">{by("estatus","En proceso")}</div><div className="l">En proceso</div></div>
        <div className="kpi"><div className="n">{by("estatus","Cerrado")}</div><div className="l">Cerrados</div></div>
        <div className={"kpi"+(emergAbiertas?" alert":"")}><div className="n">{emergAbiertas}</div><div className="l">Emergencias abiertas</div></div>
        <div className="kpi"><div className="n" style={{fontSize:24}}>{conEdad.length?fmtDur(promedioMs):"—"}</div><div className="l">Antigüedad promedio</div></div>
        <div className={"kpi"+(masAntiguo && dias(masAntiguo.acum)>=8?" alert":"")}><div className="n" style={{fontSize:24}}>{masAntiguo?fmtDur(masAntiguo.acum):"—"}</div><div className="l">Caso más antiguo</div></div>
      </div>
      {total===0
        ? <div className="card"><div className="empty-state"><div className="em-ic">✧</div>No hay casos con estos filtros.</div></div>
        : <>
          <div className="dash-grid">
            <div className="card pad"><div className="block-title" style={{marginTop:0}}>Casos por edificio</div>{edCounts.map(x=><div className="bar-row" key={x.e}><div className="bl"><span className="bn">{x.e}</span><span className="bc">{x.n}</span></div><div className="bar"><span style={{width:(x.n/maxEd*100)+"%"}}></span></div></div>)}</div>
            <div className="card pad"><div className="block-title" style={{marginTop:0}}>Casos por área</div>{famCounts.map(x=><div className="bar-row" key={x.k}><div className="bl"><span className="bn">{x.label}</span><span className="bc">{x.n}</span></div><div className="bar"><span style={{width:(x.n/maxFam*100)+"%"}}></span></div></div>)}</div>
          </div>
          <div className="dash-grid" style={{marginTop:18}}>
            <div className="card pad"><div className="block-title" style={{marginTop:0}}>Por prioridad</div>{["Emergencia","Alta","Media","Baja"].map(p=><div className="bar-row" key={p}><div className="bl"><span className="bn">{p}</span><span className="bc">{by("prioridad",p)}</span></div><div className="bar"><span style={{width:(by("prioridad",p)/Math.max(1,total)*100)+"%",background:prioColor[p]}}></span></div></div>)}</div>
            <div className="card pad"><div className="block-title" style={{marginTop:0}}>Por estatus</div>{["Recibido","En proceso","Cerrado"].map(s=><div className="bar-row" key={s}><div className="bl"><span className="bn">{s}</span><span className="bc">{by("estatus",s)}</span></div><div className="bar"><span style={{width:(by("estatus",s)/Math.max(1,total)*100)+"%",background:s==="Cerrado"?"var(--cerrado)":s==="En proceso"?"var(--proceso)":"var(--recibido)"}}></span></div></div>)}</div>
          </div>
          <div className="dash-grid" style={{marginTop:18}}>
            <div className="card pad">
              <div className="block-title" style={{marginTop:0}}>Casos abiertos por antigüedad</div>
              {conEdad.length===0
                ? <div className="hint">No hay casos abiertos con estos filtros.</div>
                : bucketCounts.map(b=><div className="bar-row" key={b.k}>
                    <div className="bl"><span className="bn">{b.k}</span><span className="bc">{b.n}</span></div>
                    <div className="bar"><span style={{width:(b.n/maxBucket*100)+"%",background:b.color}}></span></div>
                  </div>)}
              <div className="hint" style={{marginTop:8}}>El tiempo acumula la cadena: si un caso hace referencia a uno anterior, suma ambos.</div>
            </div>
            <div className="card pad">
              <div className="block-title" style={{marginTop:0}}>Abiertos más antiguos</div>
              {conEdad.length===0
                ? <div className="hint">Nada pendiente. Buen momento.</div>
                : <div className="caselist" style={{border:0}}>
                    {conEdad.slice(0,6).map(({t,acum,propio})=>(
                      <button key={t.id} className={"caserow "+(t.prioridad==="Emergencia"?"b-emerg":t.prioridad==="Alta"?"b-alta":"")} onClick={()=>onOpen(t)}>
                        <div><div className="folio mono">{t.folio}</div><div style={{marginTop:6}}><span className={"edad "+edadClass(dias(acum))}>{fmtDur(acum)}</span></div></div>
                        <div><div className="tt" style={{fontSize:13.5}}>{t.categoria}{t.relacionadoCon&&<span className="sumtag">suma {t.relacionadoCon}</span>}</div>
                          <div className="meta">{t.edificio} · Depto {t.unidad} · {t.responsable}</div></div>
                        <div className="rt"><Pill kind={statClass(t.estatus)} text={t.estatus} /></div>
                      </button>))}
                  </div>}
            </div>
          </div>

          <div className="card" style={{marginTop:18}}>
            <div className="pad" style={{paddingBottom:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div className="block-title" style={{margin:0}}>Actividad reciente</div><button className="btn sm ghost" onClick={goPortal}>Ver bandeja completa →</button></div>
            <div className="caselist" style={{border:0,margin:"10px 0 0"}}>{recientes.map(t=><button key={t.id} className={"caserow "+(t.prioridad==="Emergencia"?"b-emerg":t.prioridad==="Alta"?"b-alta":"")} onClick={()=>onOpen(t)}>
              <div><div className="folio mono">{t.folio}</div><div style={{marginTop:6}}><Pill kind={prioClass(t.prioridad)} text={t.prioridad} /></div></div>
              <div><div className="tt">{t.categoria}</div><div className="meta">{t.edificio} · Depto {t.unidad} · actualizado {relDays(t.updatedAt)}</div></div>
              <div className="rt"><Pill kind={statClass(t.estatus)} text={t.estatus} /></div>
            </button>)}</div>
          </div>
        </>}
    </div>
  );
}

/* ========================= PANEL POR EDIFICIO (2.0) ========================= */
function PanelEdificios({tickets,porFolio,verCasos}){
  const [q,setQ]=useState(""); const [soloConCasos,setSoloConCasos]=useState(true);

  const datos=useMemo(()=>EDIFICIOS.map(e=>{
    const casos=tickets.filter(t=>t.edificio===e);
    const abiertos=casos.filter(t=>t.estatus!=="Cerrado");
    const edades=abiertos.map(t=>msAcumulado(t,porFolio||{}));
    const prom=edades.length? edades.reduce((a,b)=>a+b,0)/edades.length : 0;
    const max=edades.length? Math.max(...edades) : 0;
    return {
      e, total:casos.length, abiertos:abiertos.length, cerrados:casos.length-abiertos.length,
      emerg:abiertos.filter(t=>t.prioridad==="Emergencia").length,
      alta:abiertos.filter(t=>t.prioridad==="Alta").length,
      recibidos:abiertos.filter(t=>t.estatus==="Recibido").length,
      proceso:abiertos.filter(t=>t.estatus==="En proceso").length,
      prom, max,
      tramos: BUCKETS.map(b=>edades.filter(ms=>b.test(dias(ms))).length)
    };
  }),[tickets,porFolio]);

  const visibles=datos
    .filter(d=>!soloConCasos || d.total>0)
    .filter(d=>!q.trim() || norm(d.e).includes(norm(q)))
    .sort((a,b)=> (b.emerg-a.emerg) || (b.max-a.max) || (b.abiertos-a.abiertos) || a.e.localeCompare(b.e));

  const totAbiertos=datos.reduce((s,d)=>s+d.abiertos,0);
  const totEmerg=datos.reduce((s,d)=>s+d.emerg,0);
  const edConCasos=datos.filter(d=>d.abiertos>0).length;
  const critico=datos.filter(d=>dias(d.max)>=8).length;

  const nivel=(d)=> d.emerg>0 ? "at-cri" : (dias(d.max)>=8 ? "at-alta" : (d.abiertos===0 ? "at-ok" : ""));

  return (
    <div>
      <div className="view-head"><div className="kicker">Administración</div><h2>Panel por edificio</h2><p>Un cuadro por edificio con sus indicadores clave. Ordenados por urgencia: primero los que tienen emergencias, luego los que arrastran casos más antiguos.</p></div>

      <div className="resumen">
        <div className="r"><span className="rv">{totAbiertos}</span><span className="rl">Casos abiertos</span></div>
        <div className={"r"+(totEmerg?" alerta":"")}><span className="rv">{totEmerg}</span><span className="rl">Emergencias</span></div>
        <div className="r"><span className="rv">{edConCasos}</span><span className="rl">Edificios con pendientes</span></div>
        <div className={"r"+(critico?" alerta":"")}><span className="rv">{critico}</span><span className="rl">Con casos de +8 días</span></div>
      </div>

      <div className="filters">
        <input className="ctrl search" placeholder="Buscar edificio…" value={q} onChange={e=>setQ(e.target.value)} />
        <button className={"chip"+(soloConCasos?" active":"")} onClick={()=>setSoloConCasos(s=>!s)}>{soloConCasos?"Solo con casos":"Mostrando todos"}</button>
      </div>

      <div className="leyenda">
        <span style={{fontWeight:600,color:"var(--ink)"}}>Antigüedad de los abiertos:</span>
        {BUCKETS.map(b=><span className="lg" key={b.k}><span className="sw" style={{background:b.color}}></span>{b.k}</span>)}
      </div>

      {visibles.length===0
        ? <div className="card"><div className="empty-state"><div className="em-ic">✧</div>No hay edificios que coincidan.</div></div>
        : <div className="egrid">
            {visibles.map(d=>{
              const totalTramos=d.tramos.reduce((a,b)=>a+b,0);
              return (
                <button key={d.e} className={"ecard "+nivel(d)} onClick={()=>verCasos(d.e)} title={`Ver casos de ${d.e}`}>
                  <div className="ecard-head">
                    <h4>{d.e}</h4>
                    <div><div className="abn" style={d.emerg?{color:"var(--emerg)"}:null}>{d.abiertos}</div><div className="abl">Abiertos</div></div>
                  </div>

                  <div className="ecard-kpis">
                    <div className={"mini"+(d.emerg?" alerta":"")}><div className="mv">{d.emerg}</div><div className="ml">Emergencias</div></div>
                    <div className={"mini"+(d.alta?" warn":"")}><div className="mv">{d.alta}</div><div className="ml">Prioridad alta</div></div>
                    <div className="mini"><div className="mv">{d.recibidos}</div><div className="ml">Sin atender</div></div>
                    <div className="mini"><div className="mv">{d.proceso}</div><div className="ml">En proceso</div></div>
                    <div className="mini"><div className="mv">{d.abiertos?fmtDur(d.prom):"—"}</div><div className="ml">Antigüedad prom.</div></div>
                    <div className={"mini"+(dias(d.max)>=8?" alerta":dias(d.max)>=4?" warn":"")}><div className="mv">{d.abiertos?fmtDur(d.max):"—"}</div><div className="ml">Más antiguo</div></div>
                  </div>

                  {totalTramos>0
                    ? <>
                        <div className="semaforo">
                          {d.tramos.map((n,i)=> n>0 ? <span key={i} style={{width:(n/totalTramos*100)+"%",background:BUCKETS[i].color}} title={`${n} · ${BUCKETS[i].k}`}></span> : null)}
                        </div>
                        <div className="sfoot"><span>{d.cerrados} cerrados</span><span>Ver casos →</span></div>
                      </>
                    : <div className="vacio">Sin casos abiertos{d.cerrados?` · ${d.cerrados} cerrados`:""}.</div>}
                </button>
              );
            })}
          </div>}
    </div>
  );
}

/* ========================= REGLAS (ADMIN) ========================= */
function Configuracion({user,puedeEditar,onCambio,ver,toast}){
  const [tab,setTab]=useState("tipificacion");
  return (
    <div>
      <div className="view-head"><div className="kicker">Configuración</div><h2>Reglas y edificios</h2>
        <p>Estos datos viven en la base de datos, no en el archivo: los cambios se aplican de inmediato para todos, sin volver a publicar la app.</p></div>

      <div className="filters">
        <button className={"chip"+(tab==="tipificacion"?" active":"")} onClick={()=>setTab("tipificacion")}>Tipificación</button>
        <button className={"chip"+(tab==="edificios"?" active":"")} onClick={()=>setTab("edificios")}>Edificios</button>
      </div>

      {!puedeEditar && <div className="note" style={{marginTop:0,marginBottom:18}}>
        <b>Solo lectura.</b> La edición está reservada a los administradores del sistema
        (<span className="mono">{ADMIN_SISTEMA.join(" · ")}</span>). Puedes consultar las reglas, pero no modificarlas.</div>}

      {tab==="tipificacion" ? <Tipificacion user={user} puedeEditar={puedeEditar} onCambio={onCambio} toast={toast} />
                            : <Edificios user={user} puedeEditar={puedeEditar} onCambio={onCambio} toast={toast} />}

}

/* ---- Tipificación editable ---- */
function Tipificacion({user,puedeEditar,onCambio,toast}){
  const [cats,setCats]=useState(()=>CATS.map(c=>({...c})));
  const [sucio,setSucio]=useState(false); const [guardando,setGuardando]=useState(false);
  const al={ticket:"Reclamo",consulta:"Consulta"};

  const editar=(id,campo,valor)=>{ setCats(cs=>cs.map(c=>c.id===id?{...c,[campo]:valor}:c)); setSucio(true); };
  const eliminar=(id)=>{ setCats(cs=>cs.filter(c=>c.id!==id)); setSucio(true); };
  const agregar=(fam)=>{
    const id="m"+Math.random().toString(36).slice(2,9);
    setCats(cs=>[...cs,{id,fam,label:"",prioridad:"Media",resp:"Administración",accion:"ticket"}]);
    setSucio(true);
  };
  const guardar=async()=>{
    if(cats.some(c=>!c.label.trim())){ toast("Hay motivos sin nombre. Complétalos o elimínalos.","warn"); return; }
    setGuardando(true);
    try{
      await guardarTipificacion(cats.map(c=>({...c,label:c.label.trim()})), user.email);
      aplicarCats(cats.map(c=>({...c})));
      setSucio(false); onCambio(); toast("Reglas de tipificación actualizadas.");
    }catch(e){ toast("No se pudieron guardar las reglas. ¿Tienes permisos de administrador del sistema?","error"); }
    setGuardando(false);
  };
  const restablecer=()=>{ setCats(CATS_DEFECTO.map(c=>({...c}))); setSucio(true); toast("Valores por defecto cargados. Recuerda guardar.","info"); };

  return (
    <div>
      {puedeEditar && <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <button className="btn primary" onClick={guardar} disabled={!sucio||guardando}>{guardando?"Guardando…":"Guardar cambios"}</button>
        {sucio && <span className="hint" style={{color:"var(--alta)"}}>Tienes cambios sin guardar.</span>}
        <button className="btn ghost sm" onClick={restablecer} style={{marginLeft:"auto"}}>Cargar valores por defecto</button>
      </div>}

      {Object.entries(FAMILIAS).map(([k,v])=>{
        const cs=cats.filter(c=>c.fam===k);
        return (
          <details className="rule-fam" key={k}>
            <summary><span>{v.ico} {v.label}</span><span className="hint">{cs.length} motivos</span></summary>
            <div className="rule-tbl">
              <div className="rr hd"><span>Motivo</span><span>Prioridad</span><span>Responsable</span><span>{puedeEditar?"Acción":"Tipo"}</span></div>
              {cs.map(c=> puedeEditar
                ? <div className="rr" key={c.id} style={{gridTemplateColumns:"1fr 118px 140px 116px 34px"}}>
                    <input className="ctrl" style={{padding:"6px 9px",fontSize:13}} value={c.label} placeholder="Nombre del motivo" onChange={e=>editar(c.id,"label",e.target.value)} />
                    <select className="ctrl" style={{padding:"6px 8px",fontSize:12.5}} value={c.prioridad} onChange={e=>editar(c.id,"prioridad",e.target.value)}>
                      {["Emergencia","Alta","Media","Baja"].map(p=><option key={p}>{p}</option>)}
                    </select>
                    <select className="ctrl" style={{padding:"6px 8px",fontSize:12.5}} value={c.resp} onChange={e=>editar(c.id,"resp",e.target.value)}>
                      {RESPONSABLES.map(r=><option key={r}>{r}</option>)}
                    </select>
                    <select className="ctrl" style={{padding:"6px 8px",fontSize:12.5}} value={c.accion} onChange={e=>editar(c.id,"accion",e.target.value)}>
                      <option value="ticket">Reclamo</option><option value="consulta">Consulta</option>
                    </select>
                    <button className="adj-rm" onClick={()=>eliminar(c.id)} aria-label="Eliminar motivo">✕</button>
                  </div>
                : <div className="rr" key={c.id}>
                    <span>{c.label}</span>
                    <span><Pill kind={prioClass(c.prioridad)} text={c.prioridad} /></span>
                    <span>{c.resp}</span>
                    <span className="hint" style={{fontWeight:600,color:"var(--ink)"}}>{al[c.accion]||"Gestión"}</span>
                  </div>)}
              {puedeEditar && <div className="rr" style={{gridTemplateColumns:"1fr"}}>
                <button className="btn sm ghost" onClick={()=>agregar(k)}>+ Agregar motivo a «{v.label}»</button>
              </div>}
            </div>
          </details>
        );
      })}

      <div className="note">
        <b>Qué significa cada campo.</b> <b>Prioridad</b> ordena la bandeja y define qué es una emergencia.
        <b> Responsable</b> es el área a la que se dirige el caso. <b>Acción</b> distingue un reclamo (se gestiona y se cierra)
        de una consulta (registro informativo).<br/>
        Los cambios afectan a los <b>casos nuevos</b>. Los ya ingresados conservan la clasificación que tenían.
      </div>
    </div>
  );
}

/* ---- Edificios editables ---- */
function Edificios({user,puedeEditar,onCambio,toast}){
  const [lista,setLista]=useState([]); const [cargando,setCargando]=useState(true);
  const [nuevo,setNuevo]=useState(""); const [masivo,setMasivo]=useState(""); const [verMasivo,setVerMasivo]=useState(false);
  const [trabajando,setTrabajando]=useState(false);

  const refrescar=async()=>{
    setCargando(true);
    try{ const l=await cargarEdificios(); setLista(l); if(l.length) aplicarEdificios(l.map(x=>x.nombre)); onCambio(); }
    catch(e){ toast("No se pudo leer la lista de edificios.","error"); }
    setCargando(false);
  };
  useEffect(()=>{ refrescar(); },[]);

  const agregar=async()=>{
    const n=nuevo.trim(); if(!n) return;
    if(lista.some(x=>norm(x.nombre)===norm(n))){ toast("Ese edificio ya existe.","warn"); return; }
    setTrabajando(true);
    try{ await agregarEdificio(n); setNuevo(""); await refrescar(); toast(`«${n}» agregado.`); }
    catch(e){ toast("No se pudo agregar. ¿Tienes permisos de administrador del sistema?","error"); }
    setTrabajando(false);
  };
  const quitar=async(e)=>{
    setTrabajando(true);
    try{ await borrarEdificio(e.id); await refrescar(); toast(`«${e.nombre}» eliminado.`,"info"); }
    catch(err){ toast("No se pudo eliminar.","error"); }
    setTrabajando(false);
  };
  const importar=async()=>{
    const nombres=[...new Set(masivo.split("\n").map(x=>x.trim()).filter(Boolean))];
    if(!nombres.length){ toast("Pega al menos un edificio, uno por línea.","warn"); return; }
    setTrabajando(true);
    try{
      for(const n of nombres) await agregarEdificio(n);
      setMasivo(""); setVerMasivo(false); await refrescar();
      toast(`${nombres.length} edificio${nombres.length!==1?"s":""} importado${nombres.length!==1?"s":""}.`);
    }catch(e){ toast("Falló la importación. ¿Tienes permisos de administrador del sistema?","error"); }
    setTrabajando(false);
  };
  const sembrar=async()=>{
    setTrabajando(true);
    try{ for(const n of EDIFICIOS_DEFECTO) await agregarEdificio(n); await refrescar(); toast("Lista inicial cargada."); }
    catch(e){ toast("No se pudo cargar la lista inicial.","error"); }
    setTrabajando(false);
  };

  return (
    <div>
      <div className="card pad" style={{marginBottom:18}}>
        <div className="block-title" style={{marginTop:0}}>Cómo se usan</div>
        <p className="hint" style={{marginTop:0}}>
          Cuando un residente escribe su edificio, el sistema lo valida contra esta lista y fija el que más coincide.
          Si un edificio no está aquí, el residente no podrá ingresar su caso.
        </p>
        {cargando ? <div className="hint">Cargando…</div>
          : <div className="hint">{lista.length>0
              ? <><b style={{color:"var(--ink)"}}>{lista.length}</b> edificio{lista.length!==1?"s":""} en la base de datos.</>
              : <>La base está <b>vacía</b>: por ahora se usan los {EDIFICIOS_DEFECTO.length} edificios de ejemplo incluidos en el archivo.</>}</div>}
      </div>

      {puedeEditar && <div className="card pad" style={{marginBottom:18}}>
        <div className="block-title" style={{marginTop:0}}>Agregar edificios</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:1,minWidth:220}}>
            <Field label="Nombre del edificio"><input className="ctrl" value={nuevo} placeholder="Ej: Los Aromos" onChange={e=>setNuevo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&agregar()} /></Field>
          </div>
          <button className="btn primary" onClick={agregar} disabled={trabajando||!nuevo.trim()} style={{marginBottom:16}}>Agregar</button>
          <button className="btn" onClick={()=>setVerMasivo(v=>!v)} style={{marginBottom:16}}>{verMasivo?"Cerrar importación":"Importar varios"}</button>
        </div>

        {verMasivo && <div style={{marginTop:6}}>
          <Field label="Pega la lista" hint="Un edificio por línea. Copia la columna del reporte de comunidades y pégala aquí.">
            <textarea className="ctrl" style={{minHeight:130}} value={masivo} onChange={e=>setMasivo(e.target.value)} placeholder={"Capri\nIbsen\nPortofino"} />
          </Field>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn ghost sm" onClick={()=>{setMasivo("");setVerMasivo(false);}}>Cancelar</button>
            <button className="btn primary sm" onClick={importar} disabled={trabajando||!masivo.trim()}>{trabajando?"Importando…":"Importar"}</button>
          </div>
          <div className="hint" style={{marginTop:8}}>Los repetidos se ignoran. Si un nombre ya existe, se sobrescribe con el mismo valor.</div>
        </div>}

        {lista.length===0 && !cargando && <div style={{marginTop:12}}>
          <button className="btn" onClick={sembrar} disabled={trabajando}>Cargar los {EDIFICIOS_DEFECTO.length} edificios de ejemplo</button>
          <div className="hint" style={{marginTop:6}}>Úsalo solo para probar. Lo correcto es importar la lista real del reporte de comunidades.</div>
        </div>}
      </div>}

      <div className="card">
        <div className="pad" style={{paddingBottom:8}}><div className="block-title" style={{margin:0}}>Edificios registrados</div></div>
        {cargando
          ? <div className="empty-state"><div className="hint">Cargando…</div></div>
          : lista.length===0
            ? <div className="empty-state"><div className="em-ic">✧</div>Aún no hay edificios en la base de datos.</div>
            : <div className="adj-list" style={{padding:"0 16px 16px"}}>
                {lista.map(e=>(
                  <div className="adj-item" key={e.id}>
                    <span className="adj-ic">🏢</span>
                    <span className="adj-nm">{e.nombre}</span>
                    <span className="adj-sz mono">{e.id}</span>
                    {puedeEditar && <button className="adj-rm" onClick={()=>quitar(e)} disabled={trabajando} aria-label={"Eliminar "+e.nombre}>✕</button>}
                  </div>))}
              </div>}
      </div>

      <div className="note">
        <b>De dónde sale la lista real.</b> El origen es el archivo <b>reporte_comunidades_(fecha)</b>, hoja «Egresos - titular».
        Hoy la carga es manual: copias esa columna y la pegas en «Importar varios». Automatizar esa sincronización requiere un
        proceso del lado del servidor; es un paso posterior.<br/>
        <b>Ojo:</b> eliminar un edificio no borra sus casos, pero los residentes de esa torre ya no podrán ingresar casos nuevos.
      </div>
    </div>
  );
}

/* ========================= AJUSTES (ADMIN) ========================= */
function QRBlock(){
  const [url,setUrl]=useState(""); const [gen,setGen]=useState(""); const [warn,setWarn]=useState(false); const ref=useRef(null);
  const generate=()=>{ let u=url.trim(); if(!u){ setWarn(true); return;} setWarn(false); if(!u.includes("#")) u=u.replace(/\/+$/,"")+"#residente"; setGen(u); };
  useEffect(()=>{ if(!gen||!ref.current) return; if(typeof QRCode==="undefined"){ ref.current.innerHTML="<span class='hint'>No se pudo cargar el generador de QR.</span>"; return; } ref.current.innerHTML=""; new QRCode(ref.current,{text:gen,width:200,height:200,correctLevel:QRCode.CorrectLevel.M}); },[gen]);
  const download=()=>{ const c=ref.current&&ref.current.querySelector("canvas"); if(!c)return; const a=document.createElement("a"); a.href=c.toDataURL("image/png"); a.download="acceso-residentes-qr.png"; a.click(); };
  return (
    <div>
      <p className="hint" style={{marginTop:0}}>Pega la URL pública de la Mesa de Casos. Generaremos un QR que abre directamente el acceso de residentes, para enviar por correo o publicar en cada edificio.</p>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:240}}><Field label="URL pública del portal"><input className="ctrl" placeholder="https://www.cumbregi.com/casos" value={url} onChange={e=>setUrl(e.target.value)} /></Field></div>
        <button className="btn primary" onClick={generate} style={{marginBottom:16}}>Generar QR</button>
      </div>
      {warn && <span className="hint" style={{color:"var(--emerg)"}}>Ingresa la URL pública primero.</span>}
      {gen && <div style={{marginTop:12}}>
        <div className="qr-box"><div className="qr-render" ref={ref}></div><span className="mono hint" style={{maxWidth:220,wordBreak:"break-all",textAlign:"center"}}>{gen}</span></div>
        <div style={{marginTop:12}}><button className="btn sm" onClick={download}>Descargar PNG</button></div>
      </div>}
    </div>
  );
}
function RespaldoBlock({tickets,toast}){
  const [bajando,setBajando]=useState(false);

  const bajarCSV=()=>{
    if(!tickets.length){ toast("No hay casos que respaldar.","warn"); return; }
    descargarArchivo(`mesa-de-casos-casos-${hoyISO()}.csv`, casosACSV(tickets), "text/csv;charset=utf-8");
    toast(`${tickets.length} casos descargados en CSV.`);
  };

  const bajarJSON=async()=>{
    setBajando(true);
    try{
      let edificios=[], tipificacion=null;
      try{ edificios=await cargarEdificios(); }catch(e){}
      try{ tipificacion=await cargarTipificacion(); }catch(e){}
      const dump={
        generadoEn:new Date().toISOString(),
        proyecto:firebaseConfig.projectId,
        totalCasos:tickets.length,
        casos:tickets,
        edificios:edificios.length?edificios:EDIFICIOS.map(n=>({id:slug(n),nombre:n})),
        tipificacion: tipificacion || CATS,
        familias: FAMILIAS
      };
      descargarArchivo(`mesa-de-casos-respaldo-${hoyISO()}.json`, JSON.stringify(dump,null,2), "application/json");
      toast("Respaldo completo descargado.");
    }catch(e){ toast("No se pudo generar el respaldo.","error"); }
    setBajando(false);
  };

  return (
    <div>
      <p className="hint" style={{marginTop:0}}>
        Descarga una copia de los datos en tu propio dispositivo. Es tu respaldo independiente de Google:
        sirve para archivar, auditar o migrar a otro sistema.
      </p>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:12}}>
        <button className="btn primary" onClick={bajarJSON} disabled={bajando}>{bajando?"Generando…":"Descargar respaldo completo (JSON)"}</button>
        <button className="btn" onClick={bajarCSV}>Descargar casos para Excel (CSV)</button>
      </div>
      <div className="hint" style={{marginTop:10}}>
        {tickets.length} caso{tickets.length!==1?"s":""} en la base. El JSON incluye además los edificios y las reglas de tipificación.
      </div>
      <div className="note" style={{marginTop:14}}>
        <b>Lo que esta descarga NO incluye:</b> los archivos adjuntos (solo se guardan sus enlaces),
        la lista de encargados y las reglas de seguridad. Y es una <b>copia manual</b>: no se actualiza sola.
        Para protección real y automática hay que activar los <b>respaldos programados de Firestore</b> en Google Cloud.
      </div>
    </div>
  );
}

function Ajustes({user,tickets,toast}){
  return (
    <div>
      <div className="view-head"><div className="kicker">Administración</div><h2>Ajustes</h2><p>Sesión, respaldo de datos y difusión del acceso para residentes.</p></div>
      <div className="card pad" style={{marginBottom:18}}>
        <div className="block-title" style={{marginTop:0}}>Sesión</div>
        <div className="hint">Conectado como <b style={{color:"var(--ink)"}}>{user.displayName||"—"}</b> · <span className="mono">{user.email}</span> · acceso Microsoft</div>
      </div>
      <div className="card pad" style={{marginBottom:18}}>
        <div className="block-title" style={{marginTop:0}}>Respaldo de datos</div>
        <RespaldoBlock tickets={tickets} toast={toast} />
      </div>
      <div className="card pad">
        <div className="block-title" style={{marginTop:0}}>Acceso de residentes (código QR)</div>
        <QRBlock />
      </div>
    </div>
  );
}
