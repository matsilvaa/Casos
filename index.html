<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mesa de Casos — Cumbre Asesorías Ltda.</title>
<style>
  :root{
    --ink:#15272C; --primary:#12565D; --primary-strong:#0B3B41; --primary-soft:#E4EEEE;
    --canvas:#EDF1F1; --surface:#FFFFFF; --line:#D6E0E0; --line-soft:#E7EDED;
    --muted:#5B6B70; --muted-2:#7C8A8E;
    --recibido:#2563EB; --proceso:#B45309; --cerrado:#15803D;
    --emerg:#C1121F; --alta:#DC6B1A; --media:#2A7DA3; --baja:#6B7B82;
    --radius:12px; --radius-s:8px;
    --shadow:0 1px 2px rgba(16,40,44,.06),0 8px 24px rgba(16,40,44,.06);
    --shadow-s:0 1px 2px rgba(16,40,44,.08);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--canvas);line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .mono{font-family:var(--mono)}

  .center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -10%,#DCEAEA,transparent),var(--canvas)}
  .landing{max-width:760px;width:100%}
  .landing .lead{text-align:center;margin-bottom:26px}
  .landing .mark{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);font-weight:700}
  .landing h1{font-size:32px;margin:8px 0 6px;letter-spacing:-.025em}
  .landing p{color:var(--muted);margin:0}
  .role-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .role-card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-s);transition:.16s;cursor:pointer}
  .role-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
  .role-card .rc-ic{width:46px;height:46px;border-radius:12px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
  .role-card h3{margin:0 0 6px;font-size:18px}
  .role-card p{font-size:13.5px;color:var(--muted);margin:0 0 14px}
  .role-card .go{font-size:13px;font-weight:700;color:var(--primary)}
  .login-card{max-width:440px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
  .login-card h2{margin:2px 0 4px;font-size:22px}
  .login-card .sub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
  .msbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1px solid var(--line);border-radius:var(--radius-s);padding:12px;font-size:14px;font-weight:600;color:var(--ink)}
  .msbtn:hover{border-color:var(--primary)}
  .msbtn .ms-logo{width:18px;height:18px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px}
  .msbtn .ms-logo i{display:block}
  .msbtn .ms-logo i:nth-child(1){background:#F25022}.msbtn .ms-logo i:nth-child(2){background:#7FBA00}
  .msbtn .ms-logo i:nth-child(3){background:#00A4EF}.msbtn .ms-logo i:nth-child(4){background:#FFB900}
  .note-info{background:#EAF0FB;border:1px solid #CDDCF5;border-radius:var(--radius-s);padding:11px 13px;font-size:12.5px;color:#274672;margin-top:14px}
  .err-box{background:#FBE7E8;border:1px solid #F0C7C9;border-radius:var(--radius-s);padding:11px 13px;font-size:12.5px;color:#8E1319;margin-top:14px}

  /* Advertencia de correo no deseado: deliberadamente imposible de pasar por alto. */
  .warn-box{background:#FEF3C7;border:2px solid #D97706;border-radius:10px;padding:15px 16px;margin:16px 0}
  .warn-box .wt{display:flex;gap:9px;align-items:center;font-weight:800;color:#92400E;font-size:13.5px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
  .warn-box .wt .wic{font-size:20px;line-height:1}
  .warn-box p{margin:0 0 9px;font-size:13.5px;color:#78350F}
  .warn-box p:last-child{margin-bottom:0}
  .warn-box .sender{font-family:var(--mono);font-size:11.5px;background:#FDE68A;padding:4px 8px;border-radius:5px;display:inline-block;word-break:break-all;color:#713F12}
  .warn-inline{background:#FEF3C7;border-left:3px solid #D97706;border-radius:6px;padding:9px 12px;font-size:12.5px;color:#78350F;margin-top:10px}

  .adj-list{display:flex;flex-direction:column;gap:6px}
  .adj-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px;color:var(--ink);text-decoration:none}
  a.adj-item:hover{border-color:var(--primary);background:#F7FAFA}
  .adj-ic{font-size:15px;flex:none}
  .adj-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:560}
  .adj-sz{font-size:11.5px;color:var(--muted-2);flex:none;font-variant-numeric:tabular-nums}
  .adj-rm{border:0;background:#EDF1F1;color:var(--muted);width:24px;height:24px;border-radius:6px;font-size:12px;line-height:1;flex:none}
  .adj-rm:hover{background:#FBE7E8;color:var(--emerg)}
  input[type=file].ctrl{padding:9px 11px;font-size:13px}

  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  .side{background:var(--primary-strong);color:#DCEAEA;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .mark{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8FBEC0;font-weight:600}
  .brand h1{font-size:18px;margin:6px 0 2px;color:#fff;font-weight:650;letter-spacing:-.01em}
  .brand .org{font-size:12px;color:#9DBCBE}
  .nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:#BFD6D7;padding:11px 12px;border-radius:var(--radius-s);font-size:14px;font-weight:500}
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav button.active{background:var(--primary);color:#fff}
  .nav .ico{width:18px;height:18px;flex:none;opacity:.9;text-align:center}
  .nav .badge{margin-left:auto;background:#DC6B1A;color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
  .nav button.active .badge{background:#fff;color:var(--primary-strong)}
  .side .foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}
  .side .foot .who{font-size:12px;color:#9DBCBE;margin-bottom:8px;word-break:break-all}
  .side .foot .exit{width:100%;background:rgba(255,255,255,.06);color:#CFE3E3;border:0;padding:10px;border-radius:8px;font-size:13px;font-weight:600}
  .side .foot .exit:hover{background:rgba(255,255,255,.12);color:#fff}

  .main{min-width:0}
  .content{padding:28px 34px 60px;max-width:1120px;margin:0 auto}
  .view-head{margin-bottom:22px}
  .view-head .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);font-weight:650}
  .view-head h2{font-size:25px;margin:5px 0 4px;letter-spacing:-.02em;font-weight:680}
  .view-head p{margin:0;color:var(--muted);font-size:14px;max-width:64ch}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-s)}
  .pad{padding:22px}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .field.full{grid-column:1/-1}
  label.lbl{font-size:13px;font-weight:600;color:var(--ink)}
  label.lbl .req{color:var(--emerg)}
  .hint{font-size:12px;color:var(--muted-2)}
  .ctrl{padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-s);background:#fff;color:var(--ink);width:100%;transition:border-color .15s,box-shadow .15s}
  .ctrl:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ctrl:disabled{background:#F4F7F7;color:var(--muted)}
  textarea.ctrl{min-height:112px;resize:vertical}
  .check{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-s);background:#FBFCFC}
  .check input{margin-top:2px}
  .check .t{font-size:13px}
  .sect-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:6px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line-soft)}

  .ac-wrap{position:relative}
  .ac-ok{position:absolute;right:12px;top:21px;transform:translateY(-50%);color:var(--cerrado);font-weight:700;font-size:15px;pointer-events:none}

  .triage{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:linear-gradient(180deg,#F7FAFA,#fff)}
  .triage .th{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--line-soft);background:#fff}
  .triage .th .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .triage .th h4{margin:0;font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:var(--primary);font-weight:700}
  .triage .tb{padding:16px}
  .triage.empty .tb{color:var(--muted-2);font-size:13px}
  .trow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line-soft)}
  .trow:last-child{border-bottom:0}
  .trow .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .trow .v{font-size:14px;font-weight:600;text-align:right}
  .fadein{animation:fade .32s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:650;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .pill .pdot{width:7px;height:7px;border-radius:50%}
  .p-emerg{background:#FBE7E8;color:#8E1319}.p-emerg .pdot{background:var(--emerg)}
  .p-alta{background:#FBEEDF;color:#9A4B12}.p-alta .pdot{background:var(--alta)}
  .p-media{background:#E2F0F6;color:#1C5C79}.p-media .pdot{background:var(--media)}
  .p-baja{background:#EDF1F1;color:#4C5A5E}.p-baja .pdot{background:var(--baja)}
  .s-recibido{background:#E6EEFE;color:#1D4ED8}.s-recibido .pdot{background:var(--recibido)}
  .s-proceso{background:#FBEEDF;color:#92400E}.s-proceso .pdot{background:var(--proceso)}
  .s-cerrado{background:#E4F3E9;color:#166534}.s-cerrado .pdot{background:var(--cerrado)}
  .ref-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;color:var(--primary);background:var(--primary-soft);padding:2px 8px;border-radius:6px;border:0;cursor:pointer}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 16px;border-radius:var(--radius-s);font-size:14px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--muted-2)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn.primary:hover{background:var(--primary-strong);border-color:var(--primary-strong)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.block{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--muted);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .search{flex:1;min-width:200px}
  .ms-wrap{position:relative}
  .ms-btn{border:1px solid var(--line);background:#fff;padding:7px 12px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink);display:flex;gap:6px;align-items:center}
  .ms-btn.on{border-color:var(--primary);color:var(--primary)}
  .ms-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line);border-radius:var(--radius-s);box-shadow:var(--shadow);z-index:30;width:260px;padding:8px}
  .ms-menu .ms-search{width:100%;margin-bottom:6px}
  .ms-list{max-height:220px;overflow-y:auto}
  .ms-opt{display:flex;gap:9px;align-items:center;padding:7px 8px;border-radius:6px;font-size:13.5px;cursor:pointer}
  .ms-opt:hover{background:var(--primary-soft)}
  .ms-foot{display:flex;justify-content:space-between;border-top:1px solid var(--line-soft);margin-top:6px;padding-top:8px}
  .ms-foot button{background:none;border:0;font-size:12.5px;font-weight:600;color:var(--primary)}
  .ac-empty{padding:11px;font-size:13px;color:var(--muted-2)}

  .caselist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#fff}
  .caserow{display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line-soft);text-align:left;background:#fff;border-left:3px solid transparent;width:100%}
  .caserow:last-child{border-bottom:0}
  .caserow:hover{background:#F7FAFA}
  .caserow.b-emerg{border-left-color:var(--emerg)}
  .caserow.b-alta{border-left-color:var(--alta)}
  .caserow .folio{font-size:12px;color:var(--muted)}
  .caserow .tt{font-weight:620;font-size:14px}
  .caserow .meta{font-size:12px;color:var(--muted-2);margin-top:2px}
  .caserow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .empty-state{text-align:center;padding:52px 20px;color:var(--muted)}
  .empty-state .em-ic{font-size:30px;margin-bottom:8px;opacity:.5}

  .scrim{position:fixed;inset:0;background:rgba(16,32,36,.42);display:flex;justify-content:flex-end;z-index:50}
  .drawer{width:min(560px,100%);background:var(--canvas);height:100%;overflow-y:auto;box-shadow:-14px 0 40px rgba(0,0,0,.18);animation:slidein .28s ease}
  @keyframes slidein{from{transform:translateX(24px);opacity:.6}to{transform:none;opacity:1}}
  .dr-head{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:18px 22px;z-index:2}
  .dr-head .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .dr-head h3{margin:8px 0 4px;font-size:19px;letter-spacing:-.01em}
  .dr-close{border:0;background:#EDF1F1;width:32px;height:32px;border-radius:8px;font-size:17px;color:var(--muted);line-height:1}
  .dr-body{padding:20px 22px 40px}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:13px;margin:2px 0 18px}
  .kv dt{color:var(--muted);font-weight:500}
  .kv dd{margin:0;font-weight:560}
  .block-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:20px 0 10px}
  .thread{display:flex;flex-direction:column;gap:10px}
  .msg{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .msg.staff{background:var(--primary-soft);border-color:#CFE1E1}
  .msg .who{font-size:12px;font-weight:700;display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
  .msg .who .tm{color:var(--muted-2);font-weight:500}
  .msg .tx{font-size:13.5px;white-space:pre-wrap}
  .log{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
  .log li{display:flex;gap:10px;font-size:12.5px;color:var(--muted);align-items:flex-start}
  .log .lg-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);margin-top:5px;flex:none}
  .log .lg-autor{color:var(--ink);font-weight:650}
  .log .lg-meta{display:block;color:var(--muted-2);font-size:11.5px;margin-top:1px}

  .edad{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:650;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .e-ok{background:#EDF1F1;color:#4C5A5E}
  .e-med{background:#E2F0F6;color:#1C5C79}
  .e-alt{background:#FBEEDF;color:#9A4B12}
  .e-cri{background:#FBE7E8;color:#8E1319}
  .sumtag{font-size:10.5px;font-weight:700;color:var(--primary);background:var(--primary-soft);padding:1px 6px;border-radius:5px;margin-left:5px}
  .tiempos{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0 6px}
  .tiempo-card{border:1px solid var(--line);border-radius:9px;padding:11px 13px;background:#fff}
  .tiempo-card .tl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);font-weight:700}
  .tiempo-card .tv{font-size:17px;font-weight:700;margin-top:3px;letter-spacing:-.01em}

  /* Panel por edificio: tarjetas de gestión rápida */
  .egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
  .ecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-s);padding:16px 17px;text-align:left;border-left:4px solid var(--line);transition:.15s;width:100%}
  .ecard:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--primary);border-left-color:var(--primary)}
  .ecard.at-alta{border-left-color:var(--alta)}
  .ecard.at-cri{border-left-color:var(--emerg)}
  .ecard.at-ok{border-left-color:var(--cerrado)}
  .ecard-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:13px}
  .ecard-head h4{margin:0;font-size:15.5px;font-weight:680;letter-spacing:-.01em}
  .ecard-head .abn{font-size:26px;font-weight:730;line-height:1;letter-spacing:-.03em}
  .ecard-head .abl{font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;font-weight:700;text-align:right}
  .ecard-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border:1px solid var(--line-soft);border-radius:8px;overflow:hidden;margin-bottom:12px}
  .mini{background:#fff;padding:8px 10px}
  .mini .mv{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2}
  .mini .ml{font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.04em;font-weight:650;margin-top:1px}
  .mini.alerta .mv{color:var(--emerg)}
  .mini.warn .mv{color:var(--alta)}
  .semaforo{display:flex;height:8px;border-radius:5px;overflow:hidden;background:#EDF1F1}
  .semaforo span{display:block;height:100%}
  .ecard .sfoot{display:flex;justify-content:space-between;font-size:11px;color:var(--muted-2);margin-top:6px}
  .ecard .vacio{font-size:12.5px;color:var(--muted-2);padding:6px 0}
  .leyenda{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px;font-size:12px;color:var(--muted)}
  .leyenda .lg{display:flex;align-items:center;gap:6px}
  .leyenda .sw{width:12px;height:8px;border-radius:3px;display:inline-block}
  .resumen{display:flex;flex-wrap:wrap;gap:20px;padding:14px 18px;background:var(--primary-strong);color:#DCEAEA;border-radius:var(--radius);margin-bottom:18px}
  .resumen .r{display:flex;flex-direction:column}
  .resumen .rv{font-size:22px;font-weight:730;color:#fff;line-height:1.1;letter-spacing:-.02em}
  .resumen .rl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8FBEC0;font-weight:650;margin-top:2px}
  .resumen .r.alerta .rv{color:#FFB4B4}
  .status-actions{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
  .status-actions .btn{flex:1;min-width:110px}
  .locknote{background:#F4F7F7;border:1px dashed var(--line);border-radius:var(--radius-s);padding:11px 13px;font-size:12.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .kpi .n{font-size:30px;font-weight:720;letter-spacing:-.03em;line-height:1}

const norm = s => (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString("es-CL",{day:"2-digit",month:"short"})+" · "+d.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}); }
function relDays(iso){ if(!iso) return ""; const diff=(Date.now()-new Date(iso))/86400000; if(diff<1)return"hoy"; if(diff<2)return"ayer"; return `hace ${Math.floor(diff)} días`; }

/* ---- Tiempos y antigüedad ----
   msCaso: cuánto duró (o lleva) un caso.
   cadena: recorre 'relacionadoCon' hacia atrás hasta el caso original.
   msAcumulado: suma las duraciones de toda la cadena. */
function msCaso(t){
  if(!t) return 0;
  const fin = t.estatus==="Cerrado" ? new Date(t.cerradoEn || t.updatedAt).getTime() : Date.now();
  return Math.max(0, fin - new Date(t.createdAt).getTime());
}
function cadenaCasos(t, porFolio, vistos){
  vistos = vistos || new Set();
  if(!t || vistos.has(t.folio)) return [];
  vistos.add(t.folio);
  const padre = t.relacionadoCon ? porFolio[t.relacionadoCon] : null;
  return [...cadenaCasos(padre, porFolio, vistos), t];
}
function msAcumulado(t, porFolio){
  return cadenaCasos(t, porFolio).reduce((s,c)=>s+msCaso(c), 0);
}

  const d = Math.floor(ms/86400000);

  if(d===1) return "1 día";
  return `${d} días`;
}

function resolveEdificio(query){
  const q=norm(query); if(!q) return null;
  const exact=EDIFICIOS.find(e=>norm(e)===q); if(exact) return exact;
  const pref=EDIFICIOS.filter(e=>norm(e).startsWith(q)).sort((a,b)=>a.length-b.length); if(pref.length) return pref[0];
  const inc=EDIFICIOS.filter(e=>norm(e).includes(q)).sort((a,b)=>a.length-b.length); if(inc.length) return inc[0];
  return null;
}

function escucharMios(email, cb, errCb){
  return db.collection("casos").where("email","==", email).onSnapshot(
    qs => cb(qs.docs.map(mapDoc)),

  );

async function asegurarContador(){
  const ref = db.collection("contadores").doc("casos");
  const s = await ref.get();
  if(!s.exists) await ref.set({ultimo:0});
}
async function crearCaso(base){
  const uid = auth.currentUser.uid;
  const nuevoRef = db.collection("casos").doc();
  const contRef = db.collection("contadores").doc("casos");
  const folio = await db.runTransaction(async tx=>{
    const snap = await tx.get(contRef);
    const ultimo = snap.exists ? (snap.data().ultimo||0) : 0;
    const next = ultimo+1;
    const f = "CF-2026-"+String(next).padStart(4,"0");
    tx.set(contRef, {ultimo: next}, {merge:true});
    tx.set(nuevoRef, {...base, folio:f, creadoPorUid:uid});
    return f;
  });
  return {id:nuevoRef.id, folio};
}
async function actualizarCaso(id, patch){
  await db.collection("casos").doc(id).update({...patch, updatedAt:new Date().toISOString()});
}

                .sort((a,b)=>a.nombre.localeCompare(b.nombre,"es"));
}

/* ---- Descarga de respaldos ---- */
function descargarArchivo(nombre, contenido, tipo){
  const blob = new Blob([contenido], {type:tipo});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nombre; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url), 3000);
}
const csvCampo = v => {
  const s = (v===null||v===undefined) ? "" : String(v);
  return /[";\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
};
function casosACSV(casos){
  const cab = ["Folio","Creado","Actualizado","Cerrado","Edificio","Unidad","Residente","Correo","Telefono",
               "Area","Motivo","Prioridad","Responsable","Estatus","Relacionado con","Adjuntos","Mensajes","Descripcion"];
  const filas = casos.map(t=>[
    t.folio, t.createdAt, t.updatedAt, t.cerradoEn||"", t.edificio, t.unidad, t.nombre, t.email, t.telefono||"",
    (FAMILIAS[t.familia]||{}).label||t.familia, t.categoria, t.prioridad, t.responsable, t.estatus,
    t.relacionadoCon||"", (t.adjuntos||[]).length, (t.hilo||[]).length, t.descripcion
  ].map(csvCampo).join(";"));
  // El BOM hace que Excel muestre bien los acentos.
  return "\uFEFF" + [cab.join(";"), ...filas].join("\r\n");
}
const hoyISO = () => new Date().toISOString().slice(0,10);

/* ---- Adjuntos ---- */
function validarArchivo(f){
  if(f.size > ADJ_MAX_MB*1024*1024) return `«${f.name}» supera los ${ADJ_MAX_MB} MB.`;
  if(!ADJ_TIPOS.some(t=>f.type.startsWith(t))) return `«${f.name}» no es una imagen ni un PDF.`;
  return null;
}
async function subirAdjuntos(files, uid, onProgreso){
  const out=[];
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const seguro = f.name.replace(/[^\w.\- ]/g,"_");
    const ref = storage.ref().child(`casos/${uid}/${Date.now()}-${i}-${seguro}`);
    const url = await new Promise((resolver,rechazar)=>{
      const tarea = ref.put(f, {contentType: f.type || "application/octet-stream"});
      tareaActual = tarea;
      tarea.on("state_changed",
        s => { if(onProgreso) onProgreso(i+1, files.length, Math.round((s.bytesTransferred/s.totalBytes)*100)); },
        err => rechazar(err),
        async () => { try{ resolver(await tarea.snapshot.ref.getDownloadURL()); }catch(e){ rechazar(e); } }
      );
    });
    tareaActual = null;
    out.push({nombre:f.name, url, tipo:f.type, tamano:f.size});
  }
  return out;
}
let tareaActual = null;
function cancelarSubida(){ if(tareaActual){ try{ tareaActual.cancel(); }catch(e){} tareaActual=null; } }

function traducirErrorStorage(e){
  const c = (e && e.code) || "";
  if(c==="storage/unauthorized")
    return "El almacenamiento rechazó el archivo. Falta publicar las reglas de Storage, o el tipo o tamaño no está permitido.";
  if(c==="storage/unauthenticated")
    return "Tu sesión expiró. Vuelve a entrar e inténtalo otra vez.";
  if(c==="storage/retry-limit-exceeded")
    return "La subida tardó demasiado. Puede ser una conexión lenta, o que Cloud Storage no esté habilitado en el proyecto (requiere plan Blaze).";
  if(c==="storage/canceled") return "Subida cancelada.";
  if(c==="storage/quota-exceeded") return "Se superó la cuota de almacenamiento del proyecto.";
  if(c==="storage/unknown")
    return "Error de almacenamiento. Revisa que Cloud Storage esté habilitado y que las reglas estén publicadas.";
  return (e && e.message) || "No se pudo subir el archivo.";
}

function EdificioInput({value,onResolve}){
  const [text,setText]=useState(value||""); const [resolved,setResolved]=useState(value||null); const [msg,setMsg]=useState(null);
  useEffect(()=>{ setText(value||""); setResolved(value||null); if(!value) setMsg(null); },[value]);
  const doResolve=()=>{
    if(text.trim()===""){ setResolved(null); setMsg(null); onResolve(""); return; }
    const r=resolveEdificio(text);
    if(r){ setText(r); setResolved(r); setMsg({ok:true,text:`Edificio reconocido: ${r}`}); onResolve(r); }
    else { setResolved(null); setMsg({ok:false,text:"No encontramos un edificio con ese nombre. Revisa la escritura."}); onResolve(""); }
  };
  return (
    <div className="ac-wrap">
      <input className="ctrl" value={text} placeholder="Escribe el nombre de tu edificio…" autoComplete="off"
        onChange={e=>{ setText(e.target.value); if(resolved||msg){ setResolved(null); setMsg(null); onResolve(""); } }}
        onBlur={doResolve} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); } }}
        style={resolved?{paddingRight:32}:null} />
      {resolved && <span className="ac-ok">✓</span>}
      {msg && <span className="hint" style={{color:msg.ok?"var(--cerrado)":"var(--emerg)"}}>{msg.text}</span>}
    </div>
  );
}
function MultiSelect({options,selected,onChange,label}){
  const [open,setOpen]=useState(false); const [q,setQ]=useState(""); const ref=useRef(null);
  useEffect(()=>{ const f=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown",f); return ()=>document.removeEventListener("mousedown",f); },[]);
  const toggle=(o)=>onChange(selected.includes(o)?selected.filter(x=>x!==o):[...selected,o]);
  const shown=options.filter(o=>norm(o).includes(norm(q)));
  return (
    <div className="ms-wrap" ref={ref}>
      <button className={"ms-btn"+(selected.length?" on":"")} onClick={()=>setOpen(o=>!o)}>{label}: {selected.length===0?"Todos":selected.length+(selected.length===1?" edificio":" edificios")} ▾</button>
      {open && (
        <div className="ms-menu">
          <input className="ctrl ms-search" placeholder="Buscar edificio…" value={q} onChange={e=>setQ(e.target.value)} />
          <div className="ms-list">
            {shown.map(o=><label key={o} className="ms-opt"><input type="checkbox" checked={selected.includes(o)} onChange={()=>toggle(o)} /> {o}</label>)}
            {shown.length===0 && <div className="ac-empty">Sin coincidencias.</div>}

        </div>

  );
}

function App(){
  const [authReady,setAuthReady]=useState(false);
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);          // "residente" | "admin" (elección de la pantalla inicial)
  const [tickets,setTickets]=useState([]);
  const [dataReady,setDataReady]=useState(false);
  const [denied,setDenied]=useState(false);      // encargado no autorizado
  const [denyInfo,setDenyInfo]=useState(null);   // diagnóstico del rechazo (código de error)
  const [claims,setClaims]=useState(null);       // claims del token (diagnóstico)
  const [linkSent,setLinkSent]=useState("");     // correo al que se envió el enlace
  const [authError,setAuthError]=useState("");
  const [view,setView]=useState("ingreso");
  const [preEdificio,setPreEdificio]=useState(null);
  const [maestros,setMaestros]=useState(false);
  const [ver,setVer]=useState(0);   // fuerza redibujo cuando cambian los datos maestros
  const [sel,setSel]=useState(null);
  const [toasts,setToasts]=useState([]);

  const toast=(msg,kind="ok")=>{ const id=Math.random(); setToasts(t=>[...t,{id,msg,kind}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4200); };

  // Rol preseleccionado desde el hash (#residente / #admin), p. ej. desde el QR.
  useEffect(()=>{
    const h=(location.hash||"").toLowerCase();
    if(h.includes("admin")) setRole("admin"); else if(h.includes("resident")) setRole("residente");
  },[]);

  // Completar acceso por vínculo de correo / resultado de redirección Microsoft.
  useEffect(()=>{
    (async ()=>{
      try{
        if(auth.isSignInWithEmailLink(window.location.href)){
          let email = window.localStorage.getItem("correoAcceso");
          if(!email) email = window.prompt("Confirma tu correo para completar el acceso:");
          if(email){
            await auth.signInWithEmailLink(email, window.location.href);
            window.localStorage.removeItem("correoAcceso");
            setRole("residente");
          }
          history.replaceState(null,"", window.location.pathname);
        } else {
          await auth.getRedirectResult();
        }
      }catch(e){ setAuthError(traducirError(e)); }
    })();
  },[]);

  // Estado de sesión.
  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{ setUser(u); setAuthReady(true); });
  },[]);

  const esAdmin = user && user.providerData.some(p=>p.providerId==="microsoft.com");

  // Suscripción a datos según el tipo de usuario.
  useEffect(()=>{
    if(!user){ setTickets([]); setDataReady(false); setDenied(false); setMaestros(false); return; }
    setDataReady(false); setDenied(false);

    // Datos maestros: si la base está vacía, seguimos con los valores por defecto del archivo.
    (async()=>{
      try{
        const eds = await cargarEdificios();
        if(eds.length) aplicarEdificios(eds.map(e=>e.nombre));
        const cats = await cargarTipificacion();
        if(cats) aplicarCats(cats);
      }catch(e){ /* sin permisos o sin conexión: se usan los valores por defecto */ }
      setMaestros(true);
    })();

    let unsub;
    if(esAdmin){
      setView("portal");
      user.getIdTokenResult().then(r=>setClaims(r.claims)).catch(()=>{});
      asegurarContador().catch(()=>{});
      unsub = escucharTodos(
        list=>{ setTickets(list); setDataReady(true); },
        err=>{ setDenyInfo({code:(err&&err.code)||"desconocido"}); setDenied(true); setDataReady(true); }
      );
    } else {
      setView("ingreso");
      unsub = escucharMios(
        user.email,
        list=>{ setTickets(list); setDataReady(true); },
        ()=> setDataReady(true)
      );
    }
    return ()=>{ if(unsub) unsub(); };
  },[user, esAdmin]);

  const salir=async()=>{ await auth.signOut(); setRole(null); setSel(null); setLinkSent(""); setAuthError(""); try{location.hash="";}catch(e){} };

  const enviarEnlace=async(email)=>{
    setAuthError("");
    const acs={ url: window.location.origin + window.location.pathname + "#residente", handleCodeInApp:true };
    try{
      await auth.sendSignInLinkToEmail(email, acs);
      window.localStorage.setItem("correoAcceso", email);
      setLinkSent(email);
    }catch(e){ setAuthError(traducirError(e)); }
  };
  const entrarMicrosoft=async()=>{
    setAuthError("");
    const provider=new firebase.auth.OAuthProvider("microsoft.com");
    provider.setCustomParameters({ tenant: MS_TENANT });
    try{ await auth.signInWithPopup(provider); }
    catch(e){
      if(e && (e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request"||e.code==="auth/popup-closed-by-user")){
        try{ await auth.signInWithRedirect(provider); return; }catch(e2){ setAuthError(traducirError(e2)); return; }
      }
      setAuthError(traducirError(e));
    }
  };

  // ---- Operaciones sobre casos ----
  const submitCase=async(data, onProgreso)=>{
    const cat=CATMAP[data.catId]; let prioridad=cat.prioridad;
    const now=new Date().toISOString();

    let adjuntos=[];
    if(data.archivos && data.archivos.length){
      try{ adjuntos = await subirAdjuntos(data.archivos, user.uid, onProgreso); }
      catch(e){ toast(traducirErrorStorage(e),"error"); return null; }
    }

    const base={ createdAt:now, updatedAt:now, edificio:data.edificio, unidad:data.unidad,
      nombre:data.nombre, email:user.email, telefono:data.telefono||"",
      catId:cat.id, familia:cat.fam, categoria:cat.label, prioridad, responsable:cat.resp, accion:cat.accion,
      descripcion:data.descripcion, ubicacion:data.ubicacion||"", estatus:"Recibido", relacionadoCon:null,
      adjuntos, hilo:[], acciones:[{tipo:"ingreso", detalle:`Caso ingresado y dirigido a ${cat.resp}.`, fecha:now, autor:data.nombre, autorEmail:user.email}] };
    try{ const r=await crearCaso(base); toast(`Caso ${r.folio} registrado correctamente.`); return r; }
    catch(e){ toast("No se pudo registrar el caso. Intenta nuevamente.","error"); return null; }
  };
  /* Deposita un aviso al residente en la colección 'mail'.
     La extensión "Trigger Email from Firestore" lo envía por Resend.
     Es best-effort: si falla, no interrumpe la operación. */
  async function enqueueAviso(cur, full){
    try{
      if(!cur) return;
      const email=(cur.email||"").trim(); if(!email) return;
      const folio=cur.folio||"tu caso";
      const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const hiloNuevo = Array.isArray(full.hilo) && full.hilo.length > ((cur.hilo||[]).length);
      let asunto, encabezado, detalle="";
      if(hiloNuevo){
        const msg = full.hilo[full.hilo.length-1];
        asunto = `Respuesta a tu caso ${folio}`;
        encabezado = `La administración respondió tu caso <b>${esc(folio)}</b>.`;
        const texto = msg && (msg.mensaje||msg.texto||"");
        if(texto) detalle = `<p style="margin:16px 0;padding:12px 16px;background:#F1F5F5;border-left:3px solid #12565D;border-radius:6px;color:#334155;">${esc(texto)}</p>`;
      } else if(full.estatus && full.estatus!==cur.estatus){
        asunto = `Novedades en tu caso ${folio}`;
        encabezado = `El estado de tu caso <b>${esc(folio)}</b> cambió a <b>${esc(full.estatus)}</b>.`;
      } else { return; }
      const portal = "https://casos.cumbregi.com/#residente";
      const html = `<div style="font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:520px;margin:0 auto;color:#1f2937;font-size:15px;line-height:1.5;"><p>Hola${cur.nombre?" "+esc(cur.nombre):""}:</p><p>${encabezado}</p>${detalle}<p>Entra al portal para ver los detalles y responder:</p><p style="margin:22px 0;"><a href="${portal}" style="background:#12565D;color:#fff;text-decoration:none;padding:12px 22px;border-radius:8px;display:inline-block;font-weight:600;">Ir al portal</a></p><p style="color:#64748b;font-size:13px;">Ingresa con este mismo correo (${esc(email)}); te enviaremos un enlace de acceso.</p><p style="color:#64748b;font-size:13px;">Equipo de Cumbre Asesorías Limitada</p></div>`;
      const texto = `${encabezado.replace(/<[^>]+>/g,"")}\n\nEntra al portal: ${portal}\nIngresa con tu correo ${email}.`;
      await db.collection("mail").add({ to:[email], replyTo:"comunidades@cumbregi.com", message:{ subject:asunto, html, text:texto } });
    }catch(e){ /* aviso best-effort */ }
  }

  const updateTicket=async(id,patch,logMsg,kind="info",detalleLog)=>{
    const cur=tickets.find(t=>t.id===id);
    if(cur && cur.estatus==="Cerrado"){ toast("Un caso cerrado no puede modificarse. Genera un caso relacionado.","warn"); return; }
    const full={...patch};
    if(detalleLog){
      full.acciones=[...((cur&&cur.acciones)||[]), {
        tipo:"cambio", detalle:detalleLog, fecha:new Date().toISOString(),
        autor:(user.displayName||user.email), autorEmail:user.email
      }];
    }
    if(patch.estatus==="Cerrado") full.cerradoEn=new Date().toISOString();
    try{ await actualizarCaso(id,full); if(sel&&sel.ticket.id===id) setSel(s=>({...s,ticket:{...s.ticket,...full}})); if(logMsg) toast(logMsg,kind); enqueueAviso(cur,full); }
    catch(e){ toast("No se pudo guardar el cambio.","error"); }
  };
  const crearRelacionado=async(orig,texto)=>{

      nombre:orig.nombre, email:user.email, telefono:orig.telefono||"",

      descripcion:texto, ubicacion:orig.ubicacion||"", estatus:"Recibido", relacionadoCon:orig.folio, hilo:[],
      acciones:[{tipo:"referencia", detalle:`Caso generado por disconformidad con el cierre del caso ${orig.folio}. Historial vinculado.`, fecha:now, autor:orig.nombre, autorEmail:user.email}] };
    try{ const r=await crearCaso(base); toast(`Caso relacionado ${r.folio} creado y vinculado a ${orig.folio}.`); return {...base,id:r.id,folio:r.folio}; }
    catch(e){ toast("No se pudo crear el caso relacionado.","error"); return null; }
  };

  /* ---- Render ---- */
  if(!authReady) return <div className="loader">Cargando…</div>;

  // Sin sesión: pantalla inicial y accesos.
  if(!user){
    if(!role) return <Landing choose={setRole} />;
    if(role==="admin") return <AdminLogin onEntrar={entrarMicrosoft} onBack={()=>{setRole(null);setAuthError("");}} error={authError} />;

            <NavBtn id="panel" cur={view} set={navegar} ico="▦" label="Panel" />

            <NavBtn id="reglas" cur={view} set={navegar} ico="▤" label="Configuración" />
            <NavBtn id="ajustes" cur={view} set={navegar} ico="⚙" label="Ajustes" />
          </>}
        </nav>
        <div className="foot">
          <div className="who">{esAdmin?(user.displayName||user.email):user.email}</div>
          <button className="exit" onClick={salir}>Cerrar sesión</button>

          {!esAdmin && view==="ingreso" && <Ingreso submitCase={submitCase} email={user.email} goMisCasos={()=>setView("miscasos")} />}
          {!esAdmin && view==="miscasos" && <MisCasos tickets={tickets} email={user.email} onOpen={t=>setSel({ticket:t,mode:"residente"})} />}
          {esAdmin && view==="portal" && <Portal tickets={tickets} porFolio={porFolio} initEd={preEdificio} onOpen={t=>setSel({ticket:t,mode:"admin"})} />}
          {esAdmin && view==="panel" && <Panel tickets={tickets} porFolio={porFolio} onOpen={t=>setSel({ticket:t,mode:"admin"})} goPortal={()=>navegar("portal")} />}
          {esAdmin && view==="edificios" && <PanelEdificios tickets={tickets} porFolio={porFolio} verCasos={verCasosEdificio} />}
          {esAdmin && view==="reglas" && <Configuracion user={user} puedeEditar={ADMIN_SISTEMA.includes(norm(user.email))} onCambio={()=>setVer(v=>v+1)} ver={ver} toast={toast} />}
          {esAdmin && view==="ajustes" && <Ajustes user={user} tickets={tickets} toast={toast} />}
        </div>
      </main>

      {sel && <Detail entry={sel} porFolio={porFolio} onClose={()=>setSel(null)} update={updateTicket} crearRelacionado={crearRelacionado} related={findRelated(sel.ticket.folio)} openTicketByFolio={(f)=>{const t=tickets.find(x=>x.folio===f); if(t) setSel({ticket:t,mode:sel.mode});}} />}
      <div className="toasts">{toasts.map(t=><div key={t.id} className={"toast "+t.kind}><span className="tk"></span><span>{t.msg}</span></div>)}</div>
    </div>
  );
}

const HOST = (typeof location!=="undefined") ? location.hostname : "";
const ES_LOCAL = ["localhost","127.0.0.1"].includes(HOST);
const SIN_HTTPS = (typeof location!=="undefined") && location.protocol==="http:" && !ES_LOCAL;

function traducirError(e){
  const c=e&&e.code||"";
  if(c==="auth/unauthorized-domain") return `El dominio ${HOST} no está autorizado. Agrégalo en Firebase → Authentication → Configuración → Dominios autorizados.`;
  if(c==="auth/quota-exceeded") return "Se alcanzó el límite diario de enlaces de acceso. El plan gratuito de Firebase permite solo 5 al día en todo el sistema. Para uso real hay que activar el plan Blaze (sube el límite a 25.000 diarios).";
  if(c==="auth/too-many-requests") return "Demasiados intentos seguidos. Espera unos minutos e inténtalo de nuevo.";
  if(c==="auth/operation-not-allowed") return "El proveedor de acceso no está habilitado en Firebase.";
  if(c==="auth/invalid-email") return "El correo no es válido.";
  if(c==="auth/account-exists-with-different-credential") return "Ya existe una cuenta con ese correo usando otro método.";
  return (e&&e.message) || "Ocurrió un error de autenticación.";
}

/* ========================= INGRESO (RESIDENTE) ========================= */
function Ingreso({submitCase,email,goMisCasos}){
  const empty={edificio:"",unidad:"",nombre:"",telefono:"",fam:"",catId:"",descripcion:"",ubicacion:""};
  const [f,setF]=useState(empty); const [errors,setErrors]=useState({}); const [done,setDone]=useState(null); const [saving,setSaving]=useState(false);
  const [archivos,setArchivos]=useState([]); const [errFiles,setErrFiles]=useState(""); const [progreso,setProgreso]=useState(null);
  const [pct,setPct]=useState(0); const [estancado,setEstancado]=useState(false); const [falloSubida,setFalloSubida]=useState("");

  // Si a los 12 segundos no se ha transferido ni un byte, el problema no es la conexión.
  useEffect(()=>{
    if(!saving || !archivos.length){ setEstancado(false); return; }
    const t=setTimeout(()=>{ if(pct===0) setEstancado(true); }, 12000);
    return ()=>clearTimeout(t);
  },[saving,pct,archivos.length]);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const cat=f.catId?CATMAP[f.catId]:null; const catsOfFam=f.fam?CATS.filter(c=>c.fam===f.fam):[];
  const prioridad=cat?cat.prioridad:null;
  const accionTxt={ticket:"Reclamo registrado y notificado al responsable",consulta:"Registro informativo para gestión"};

  const onFiles=(e)=>{
    const nuevos=Array.from(e.target.files||[]); e.target.value="";
    if(!nuevos.length) return;
    if(archivos.length+nuevos.length > ADJ_MAX_ARCHIVOS){ setErrFiles(`Puedes adjuntar hasta ${ADJ_MAX_ARCHIVOS} archivos.`); return; }
    for(const n of nuevos){ const er=validarArchivo(n); if(er){ setErrFiles(er); return; } }
    setErrFiles(""); setArchivos(a=>[...a,...nuevos]);
  };
  const quitar=(i)=>{ setArchivos(a=>a.filter((_,k)=>k!==i)); setErrFiles(""); };

  const submit=async(sinAdjuntos)=>{
    const er={};
    ["unidad","nombre","fam","catId","descripcion"].forEach(k=>{ if(!f[k]) er[k]="Requerido"; });
    if(!f.edificio) er.edificio="Selecciona un edificio válido";
    setErrors(er); if(Object.keys(er).length) return;
    const adj = sinAdjuntos===true ? [] : archivos;
    setSaving(true); setPct(0); setEstancado(false); setFalloSubida("");
    const r=await submitCase({...f, archivos:adj}, (n,total,porcentaje)=>{
      setPct(porcentaje);
      setProgreso(total>1 ? `Subiendo adjunto ${n} de ${total} · ${porcentaje}%` : `Subiendo · ${porcentaje}%`);
    });
    setSaving(false); setProgreso(null); setPct(0); setEstancado(false);
    if(r){ setDone(r); window.scrollTo({top:0,behavior:"smooth"}); }
    else if(adj.length){ setFalloSubida("No se pudieron subir los adjuntos. Puedes enviar el caso sin ellos y adjuntarlos después, cuando el almacenamiento esté habilitado."); }
  };

  if(done){
    return (
      <div className="card pad conf fadein">
        <div className="ok">✓</div><h3>Recibimos tu caso</h3>
        <p style={{color:"var(--muted)",margin:0}}>Guarda este folio para hacer seguimiento en «Mis casos».</p>
        <div className="folio-lg">{done.folio}</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn primary" onClick={()=>{setDone(null);setF(empty);setErrors({});}}>Ingresar otro caso</button>
          <button className="btn ghost" onClick={goMisCasos}>Ver mis casos</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="view-head"><div className="kicker">Portal de residentes</div><h2>Ingresar un caso</h2><p>Cuéntanos qué ocurre. El sistema clasifica tu caso, define la prioridad y lo dirige al responsable correcto de forma automática.</p></div>
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 300px",gap:22,alignItems:"start"}} className="ingreso-layout">
        <div className="card pad">
          <div className="sect-label">1 · Tus datos</div>
          <div className="form-grid">
            <Field label="Edificio" req err={errors.edificio} hint="Escríbelo; lo validamos al terminar">
              <EdificioInput value={f.edificio} onResolve={v=>set("edificio",v)} />
            </Field>
            <Field label="Unidad / Depto" req err={errors.unidad}><input className="ctrl" placeholder="Ej: 1204" value={f.unidad} onChange={e=>set("unidad",e.target.value)} /></Field>
            <Field label="Nombre" req err={errors.nombre}><input className="ctrl" value={f.nombre} onChange={e=>set("nombre",e.target.value)} /></Field>
            <Field label="Correo" hint="Con este correo sigues tus casos"><input className="ctrl" type="email" value={email} disabled /></Field>
            <Field label="Teléfono" hint="Opcional"><input className="ctrl" value={f.telefono} onChange={e=>set("telefono",e.target.value)} /></Field>
          </div>
          <div className="sect-label" style={{marginTop:8}}>2 · Motivo</div>
          <div className="form-grid">
            <Field label="Categoría general" req err={errors.fam}>
              <select className="ctrl" value={f.fam} onChange={e=>{set("fam",e.target.value);set("catId","");}}><option value="">Selecciona…</option>{Object.entries(FAMILIAS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
            </Field>
            <Field label="Motivo específico" req err={errors.catId}>
              <select className="ctrl" value={f.catId} onChange={e=>set("catId",e.target.value)} disabled={!f.fam}><option value="">{f.fam?"Selecciona…":"Elige primero una categoría"}</option>{catsOfFam.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select>
            </Field>
          </div>
          <Field label="Ubicación exacta" hint="Piso, ascensor, estacionamiento…" full><input className="ctrl" value={f.ubicacion} onChange={e=>set("ubicacion",e.target.value)} /></Field>
          <Field label="Descripción" req err={errors.descripcion} full><textarea className="ctrl" placeholder="Describe el problema con el mayor detalle posible." value={f.descripcion} onChange={e=>set("descripcion",e.target.value)} /></Field>

          <div className="sect-label" style={{marginTop:22}}>3 · Adjuntos</div>
          <div className="field full">
            <label className="lbl">Fotos o documentos <span className="hint" style={{fontWeight:400}}>· opcional · hasta {ADJ_MAX_ARCHIVOS} archivos de {ADJ_MAX_MB} MB · imágenes o PDF</span></label>
            <input className="ctrl" type="file" multiple accept="image/*,application/pdf" onChange={onFiles} disabled={saving} />
            {errFiles && <span className="hint" style={{color:"var(--emerg)"}}>{errFiles}</span>}
            {archivos.length===0 && <span className="hint">Una foto del problema ayuda a resolverlo más rápido.</span>}
            {archivos.length>0 && <div className="adj-list" style={{marginTop:9}}>
              {archivos.map((a,i)=>(<div key={i} className="adj-item">
                <span className="adj-ic">{a.type.startsWith("image/")?"🖼️":"📄"}</span>
                <span className="adj-nm">{a.name}</span>
                <span className="adj-sz">{(a.size/1048576).toFixed(1)} MB</span>
                <button className="adj-rm" onClick={()=>quitar(i)} disabled={saving} aria-label={"Quitar "+a.name}>✕</button>
              </div>))}
            </div>}
          </div>

          {saving && archivos.length>0 && <div style={{marginTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:"var(--muted)",marginBottom:5}}>
              <span>{progreso||"Preparando…"}</span><span className="mono">{pct}%</span>
            </div>
            <div className="bar"><span style={{width:pct+"%",transition:"width .25s"}}></span></div>
            {estancado && <div className="warn-inline" style={{marginTop:10}}>
              <b>La subida no está avanzando.</b> No es tu conexión: es probable que Cloud Storage no esté habilitado
              en el proyecto, o que falten publicar las reglas de almacenamiento. Puedes cancelar y enviar el caso sin adjuntos.
            </div>}
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
              <button className="btn ghost sm" onClick={cancelarSubida}>Cancelar subida</button>
            </div>
          </div>}

          {falloSubida && !saving && <div className="err-box" style={{marginTop:14}}>
            <div style={{marginBottom:10}}>{falloSubida}</div>
            <button className="btn sm" onClick={()=>submit(true)}>Enviar el caso sin adjuntos</button>
          </div>}

          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:12,marginTop:20}}>
            {progreso && !archivos.length && <span className="hint">{progreso}</span>}
            <button className="btn primary" onClick={()=>submit(false)} disabled={saving}>{saving?(archivos.length?"Subiendo…":"Enviando…"):"Enviar caso"}</button>
          </div>
        </div>
        <div className={"triage"+(cat?"":" empty")}>
          <div className="th"><span className="dot"></span><h4>Clasificación automática</h4></div>
          <div className="tb">
            {!cat && <span>Al elegir el motivo verás aquí cómo se clasificará el caso: prioridad, responsable y qué hará el sistema.</span>}
            {cat && <div className="fadein" key={f.catId}>
              <div className="trow"><span className="k">Área</span><span className="v">{FAMILIAS[cat.fam].label}</span></div>
              <div className="trow"><span className="k">Prioridad</span><span className="v"><Pill kind={prioClass(prioridad)} text={prioridad} /></span></div>
              <div className="trow"><span className="k">Responsable</span><span className="v">{cat.resp}</span></div>
              <div className="trow"><span className="k">Acción</span><span className="v" style={{fontWeight:500,fontSize:13,color:"var(--muted)"}}>{accionTxt[cat.accion]||"Registro para gestión"}</span></div>
            </div>}
          </div>
        </div>
      </div>
      <style>{`@media(max-width:900px){.ingreso-layout{grid-template-columns:1fr!important}}`}</style>
    </div>
  );
}
